<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='logo.png') }}"
                 width="80"
                 class="rounded bg-white p-1 me-3">

            <div>
                <h4 class="mb-0 text-white">Hamdel School Management System</h4>
                <small class="text-light">Educate • Manage • Empower</small>
            </div>
        </a>
    </div>
</nav>

<div class="container mt-5">

    <h2>Edit Student</h2>

    <div class="card shadow">
        <div class="card-header bg-warning">
            Update Student Information
        </div>

        <div class="card-body">

            <form action="/update_student/{{ student[0] }}" method="POST">

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label>First Name</label>
                        <input type="text" name="first_name" class="form-control" value="{{ student[1] }}" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Last Name</label>
                        <input type="text" name="last_name" class="form-control" value="{{ student[2] }}" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Gender</label>
                        <select name="gender" class="form-control">
                            <option value="Male" {% if student[3] == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if student[3] == 'Female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Date of Birth</label>
                        <input type="date" name="date_of_birth" class="form-control" value="{{ student[4] }}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Grade</label>
                        <input type="text" name="grade" class="form-control" value="{{ student[5] }}">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ student[6] }}">
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" value="{{ student[7] }}">
                    </div>

                </div>

                <button class="btn btn-success">Update Student</button>
                <a href="/students" class="btn btn-secondary">Cancel</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
